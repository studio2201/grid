services:
  grid:
    image: ubermetroid/grid:latest
    build: .
    container_name: grid
    restart: unless-stopped
    ports:
      - ${PORT:-4405}:4405
    volumes:
      - ./data:/app/data
    environment:
      PORT: 4405
      SITE_TITLE: ${SITE_TITLE:-Grid}
      GRID_PIN: ${GRID_PIN:-}
      BASE_URL: ${BASE_URL:-http://localhost:4405}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-UTC}
      ENABLE_TRANSLATION: ${ENABLE_TRANSLATION:-false}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-5}

